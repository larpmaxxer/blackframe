[colors]
background = #000000
foreground = #FFFFFF
muted = #666666
border = #262626

[bar/main]
width = 98%
height = 34pt
offset-x = 1%
offset-y = 12px
radius = 10
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0pt
border-size = 1pt
border-color = ${colors.border}

padding-left = 2
padding-right = 2
module-margin = 1

font-0 = "JetBrains Mono:style=Medium:size=10;3"
font-1 = "JetBrains Mono:style=Bold:size=10;3"

modules-left = xworkspaces
modules-center = date
modules-right = cpu memory pulseaudio tray

cursor-click = pointer
enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.foreground}
label-active-foreground = ${colors.background}
label-active-padding = 2
label-active-font = 2

label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 2

label-empty = %name%
label-empty-foreground = ${colors.muted}
label-empty-padding = 2

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.foreground}
label-font = 2

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.muted}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.muted}
label = %percentage_used:2%%

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.muted}
label-volume = %percentage%%
label-muted = "MUTED"
label-muted-foreground = ${colors.muted}

[module/tray]
type = internal/tray
tray-spacing = 8px
tray-size = 16px
